{% extends "base.html" %}
{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="{% url 'compraventa:home' %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver a compra-venta
    </a>
    <h3 class="fw-bold mb-1">Registrar proveedor / agencia</h3>
    <p class="text-muted mb-0">Completá los datos del proveedor</p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label">Nombre de la empresa</label>
            {{ form.nombre_empresa }}
        </div>

        <div class="mb-4">
            <label class="form-label">CUIT</label>
            {{ form.cuit }}
        </div>

        <div class="form-check form-switch mb-4">
            {{ form.activo }}
            <label class="form-check-label ms-2">Proveedor activo</label>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save" style="width:16px;height:16px;margin-right:6px;"></i>
                Guardar
            </button>
            <a href="{% url 'compraventa:home' %}" class="btn btn-secondary">
                Volver
            </a>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>

{% endblock %}
