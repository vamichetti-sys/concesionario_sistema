{% extends "base.html" %}

{% block title %}Gastos{% endblock %}

{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="/vehiculos/" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver al stock
    </a>
    <h3 class="fw-bold mb-1">Configuración de gastos de ingreso</h3>
    <p class="text-muted mb-0">Definí los montos predeterminados para cada tipo de gasto</p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:800px;">
    <form method="post">
        {% csrf_token %}

        <div class="row g-4">
            <div class="col-md-4">
                <label class="form-label">Formulario 08</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_f08" class="form-control" value="{{ config.gasto_f08|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Informes</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_informes" class="form-control" value="{{ config.gasto_informes|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Patentes</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_patentes" class="form-control" value="{{ config.gasto_patentes|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Infracciones</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_infracciones" class="form-control" value="{{ config.gasto_infracciones|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Verificación</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_verificacion" class="form-control" value="{{ config.gasto_verificacion|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Autopartes</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_autopartes" class="form-control" value="{{ config.gasto_autopartes|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">VTV</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_vtv" class="form-control" value="{{ config.gasto_vtv|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">R-541</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_r541" class="form-control" value="{{ config.gasto_r541|default_if_none:'0.00' }}">
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label">Firmas</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="text" name="gasto_firmas" class="form-control" value="{{ config.gasto_firmas|default_if_none:'0.00' }}">
                </div>
            </div>
        </div>

        <hr class="my-4">

        <button type="submit" class="btn btn-primary">
            <i data-lucide="save" style="width:16px;height:16px;margin-right:6px;"></i>
            Guardar gastos
        </button>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>

{% endblock %}
