{% extends "base.html" %}

{% block title %}Agregar gasto de ingreso{% endblock %}

{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="{% url 'cuentas:cuenta_corriente_detalle' vehiculo.venta.cuenta_corriente.id %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver a cuenta corriente
    </a>
    <h3 class="fw-bold mb-1">Gasto de ingreso</h3>
    <p class="text-muted mb-0">Vehículo: <strong>{{ vehiculo }}</strong></p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:500px;">
    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label">Descripción</label>
            <input type="text" name="descripcion" class="form-control" placeholder="Ej: Transferencia, gestoría, verificación..." required>
        </div>

        <div class="mb-4">
            <label class="form-label">Monto</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="monto" class="form-control" step="0.01" required>
            </div>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save" style="width:16px;height:16px;margin-right:6px;"></i>
                Guardar gasto
            </button>
            <a href="{% url 'cuentas:cuenta_corriente_detalle' vehiculo.venta.cuenta_corriente.id %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>

{% endblock %}
