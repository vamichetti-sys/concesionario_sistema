{% extends "base.html" %}

{% block title %}Registrar pago de gestoría{% endblock %}

{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="{% url 'cuentas:cuenta_corriente_detalle' cuenta.id %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver a cuenta corriente
    </a>
    <h3 class="fw-bold mb-1">Registrar pago de gestoría</h3>
    <p class="text-muted mb-0">Cliente: <strong>{{ cuenta.cliente }}</strong></p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:500px;">
    <div class="p-3 mb-4" style="background:#f8f9fa;border-radius:12px;">
        <small class="text-muted">Total gestoría</small>
        <div class="fw-bold text-danger" style="font-size:24px;">$ {{ total_gestoria|floatformat:0 }}</div>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label">Monto a pagar</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" name="monto" class="form-control" step="0.01" min="0.01" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="2"></textarea>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-success">
                <i data-lucide="check" style="width:16px;height:16px;margin-right:6px;"></i>
                Registrar pago
            </button>
            <a href="{% url 'cuentas:cuenta_corriente_detalle' cuenta.id %}" class="btn btn-secondary">Volver</a>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>

{% endblock %}
