{% extends "base.html" %}
{% block title %}Calendario{% endblock %}
{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h3 class="fw-bold mb-1">Calendario de vencimientos y turnos</h3>
        <p class="text-muted mb-0">Vencimientos de documentación y turnos programados por vehículo</p>
    </div>
    <button id="btnPdfMes" class="btn btn-primary">
        <i data-lucide="file-down" style="width:16px;height:16px;margin-right:6px;"></i>
        Exportar PDF del mes
    </button>
</div>

<!-- ===============================
     LEYENDA
=============================== -->
<div class="card p-3 mb-4">
    <div class="d-flex flex-wrap gap-4">
        <div class="d-flex align-items-center gap-2">
            <span style="width:16px;height:16px;background:#ef4444;display:inline-block;border-radius:4px;"></span>
            <span style="font-size:13px;">Vencimiento VTV</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span style="width:16px;height:16px;background:#f97316;display:inline-block;border-radius:4px;"></span>
            <span style="font-size:13px;">Vencimiento Verificación</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span style="width:16px;height:16px;background:#eab308;display:inline-block;border-radius:4px;"></span>
            <span style="font-size:13px;">Vencimiento Patentes</span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span style="width:16px;height:16px;background:#3b82f6;display:inline-block;border-radius:4px;"></span>
            <span style="font-size:13px;">Turnos</span>
        </div>
    </div>
</div>

<!-- ===============================
     CALENDARIO
=============================== -->
<div class="card p-4">
    <div id="calendar"></div>
</div>

<!-- ===============================
     FULLCALENDAR
=============================== -->
