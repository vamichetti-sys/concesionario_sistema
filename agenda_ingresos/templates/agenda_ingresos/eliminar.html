{% extends "base.html" %}
{% block title %}Eliminar ingreso{% endblock %}

{% block content %}
<div class="card p-4" style="max-width:520px;">
    <div class="d-flex align-items-center gap-2 mb-3">
        <i data-lucide="alert-triangle" style="width:22px;height:22px;color:#ef4444;"></i>
        <h5 class="fw-bold mb-0">Eliminar ingreso</h5>
    </div>
    <p>¿Eliminar <strong>{{ obj.descripcion }}</strong> de la agenda? Si ya estaba cobrado, también se borra el registro del módulo destino.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-danger"><i data-lucide="trash-2" style="width:16px;height:16px;margin-right:6px;"></i> Sí, eliminar</button>
            <a href="{% url 'agenda_ingresos:lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
<script>if (typeof lucide !== 'undefined') lucide.createIcons();</script>
{% endblock %}
