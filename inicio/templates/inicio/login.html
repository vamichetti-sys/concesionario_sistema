{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8f9fa;
        }

        .login-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* PANEL IZQUIERDO */
        .left-panel {
            width: 55%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .left-panel .content {
            position: relative;
            z-index: 1;
        }

        .left-panel h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .left-panel h3 {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.6;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .left-panel img {
            width: 180px;
            margin-top: 20px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
        }

        .left-panel .tagline {
            margin-top: 50px;
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            max-width: 300px;
            line-height: 1.6;
        }

        /* PANEL DERECHO */
        .right-panel {
            width: 45%;
            background: #f8f9fa;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-panel h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 32px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .slogan {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 40px;
        }

        .form-label {
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            height: 50px;
            padding: 12px 18px;
            font-size: 15px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            background: #ffffff;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                padding: 40px 20px;
                min-height: 280px;
            }

            .left-panel h1 {
                font-size: 32px;
            }

            .left-panel img {
                width: 120px;
            }

            .right-panel {
                width: 100%;
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- IZQUIERDA -->
        <div class="left-panel">
            <div class="content">
                <h1>AMICHETTI</h1>
                <h3>Automotores</h3>
                <img src="{% static 'img/logo_amichetti.png' %}" alt="Logo Amichetti">
                <p class="tagline">Sistema integral de gestión para concesionarios</p>
            </div>
        </div>

        <!-- DERECHA -->
        <div class="right-panel">
            <h2>Bienvenido</h2>
            <p class="slogan">Tu próximo auto está acá.</p>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>

            <p class="footer-text">© 2026 Amichetti Automotores. Todos los derechos reservados.</p>
        </div>
    </div>
</body>
</html>
