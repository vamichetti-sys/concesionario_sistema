{% extends "base.html" %}
{% block title %}Eliminar factura{% endblock %}
{% block content %}

<div class="mb-4">
    <a href="{% url 'facturacion:lista' %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver
    </a>
    <h3 class="fw-bold mb-1">Eliminar factura</h3>
</div>

<div class="card p-4" style="max-width:600px;">
    <div class="alert alert-danger" style="border-radius:10px;">
        <i data-lucide="alert-triangle" style="width:16px;height:16px;margin-right:6px;"></i>
        Estas por eliminar la factura <strong>#{{ factura.numero }}</strong> por <strong>${{ factura.monto|floatformat:2 }}</strong> del {{ factura.fecha|date:"d/m/Y" }}.
    </div>

    <form method="post" class="d-flex gap-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i data-lucide="trash-2" style="width:16px;height:16px;margin-right:6px;"></i>
            Eliminar
        </button>
        <a href="{% url 'facturacion:lista' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script>lucide.createIcons();</script>
{% endblock %}
