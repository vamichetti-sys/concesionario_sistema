{% extends "base.html" %}
{% block title %}Editar Cliente{% endblock %}
{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="{% url 'clientes:detalle_cliente' cliente.id %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver a ficha
    </a>
    <h3 class="fw-bold mb-1">Editar Cliente</h3>
    <p class="text-muted mb-0">{{ cliente.nombre_completo }}</p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:700px;">
    <form method="post">
        {% csrf_token %}

        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                {{ form.telefono }}
            </div>

            <div class="col-md-6">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <div class="col-md-6">
                <label class="form-label">DNI / CUIT</label>
                {{ form.dni_cuit }}
            </div>

            <div class="col-md-6">
                <label class="form-label">Dirección</label>
                {{ form.direccion }}
            </div>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save" style="width:16px;height:16px;margin-right:6px;"></i>
                Guardar cambios
            </button>
            <a href="{% url 'clientes:detalle_cliente' cliente.id %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>

{% endblock %}
