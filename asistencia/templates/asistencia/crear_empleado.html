{% extends "base.html" %}
{% block content %}

<!-- ===============================
     ENCABEZADO
=============================== -->
<div class="mb-4">
    <a href="{% url 'asistencia:lista' %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver a asistencia
    </a>
    <h3 class="fw-bold mb-1">Agregar empleado</h3>
    <p class="text-muted mb-0">Completá los datos del nuevo empleado</p>
</div>

<!-- ===============================
     FORMULARIO
=============================== -->
<div class="card p-4" style="max-width:500px;">
    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label">Nombre completo</label>
            {{ form.nombre }}
        </div>

        <div class="form-check mb-4">
            {{ form.activo }}
            <label class="form-check-label">
                Empleado activo
            </label>
        </div>

        <hr class="my-4">

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save" style="width:16px;height:16px;margin-right:6px;"></i>
                Guardar
            </button>
            <a href="{% url 'asistencia:lista' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>

<script>
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
</script>

{% endblock %}
