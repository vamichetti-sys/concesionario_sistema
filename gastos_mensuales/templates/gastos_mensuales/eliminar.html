{% extends "base.html" %}
{% block title %}Eliminar gasto{% endblock %}
{% block content %}

<div class="mb-4">
    <a href="{% url 'gastos_mensuales:resumen' %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver
    </a>
    <h3 class="fw-bold mb-1">Eliminar gasto</h3>
</div>

<div class="card p-4" style="max-width:600px;">
    <div class="alert alert-danger" style="border-radius:10px;">
        <i data-lucide="alert-triangle" style="width:16px;height:16px;margin-right:6px;"></i>
        Est&aacute;s por eliminar el gasto <strong>{{ gasto.categoria.nombre }}</strong> por <strong>${{ gasto.monto|floatformat:0 }}</strong> de {{ gasto.mes }}/{{ gasto.anio }}.
    </div>

    <form method="post" class="d-flex gap-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i data-lucide="trash-2" style="width:16px;height:16px;margin-right:6px;"></i>
            Eliminar
        </button>
        <a href="{% url 'gastos_mensuales:resumen' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script>lucide.createIcons();</script>
{% endblock %}
