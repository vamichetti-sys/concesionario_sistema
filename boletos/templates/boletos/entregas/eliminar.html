{% extends "base.html" %}
{% block title %}Eliminar entrega{% endblock %}
{% block content %}

<div class="mb-4">
    <a href="{% url 'boletos:lista_entregas' %}" class="text-muted text-decoration-none d-inline-flex align-items-center mb-2" style="font-size:14px;">
        <i data-lucide="arrow-left" style="width:16px;height:16px;margin-right:6px;"></i>
        Volver
    </a>
    <h3 class="fw-bold mb-1">Eliminar entrega</h3>
</div>

<div class="card p-4" style="max-width:600px;">
    <div class="alert alert-danger" style="border-radius:10px;">
        <i data-lucide="alert-triangle" style="width:16px;height:16px;margin-right:6px;"></i>
        Estas por eliminar la entrega de <strong>{{ entrega.nombre_comprador }}</strong> – {{ entrega.marca }} {{ entrega.modelo }} ({{ entrega.dominio }}).
    </div>

    <form method="post" class="d-flex gap-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i data-lucide="trash-2" style="width:16px;height:16px;margin-right:6px;"></i>
            Eliminar
        </button>
        <a href="{% url 'boletos:lista_entregas' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script>lucide.createIcons();</script>
{% endblock %}
