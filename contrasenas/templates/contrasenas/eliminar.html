{% extends "base.html" %}
{% block title %}Eliminar contraseña{% endblock %}

{% block content %}

<div class="card p-4" style="max-width:520px;">
    <h4 class="fw-bold mb-3">Eliminar contraseña</h4>
    <p class="mb-4">
        ¿Seguro que querés eliminar la contraseña de
        <strong>{{ obj.servicio }}</strong>? Esta acción no se puede deshacer.
    </p>
    <form method="post" data-no-confirm>
        {% csrf_token %}
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-danger">
                <i data-lucide="trash-2" style="width:16px;height:16px;margin-right:6px;"></i>
                Eliminar
            </button>
            <a href="{% url 'contrasenas:lista' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}

{% block extra_js %}
<script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
{% endblock %}
